services:
  embedder-cpu:
    build:
      context: .
      dockerfile: Dockerfile.embedder.cpu
    profiles: [cpu]
    volumes:
      - ./configs:/app/configs
      - ${HF_CACHE_PATH}:/root/.cache/huggingface
    ports:
      - "${EMBEDDER_CPU_PORT}:8080"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped

  embedder-gpu:
    build:
      context: .
      dockerfile: Dockerfile.embedder.gpu
    profiles: [gpu]
    volumes:
      - ./configs:/app/configs
      - ${HF_CACHE_PATH}:/root/.cache/huggingface
    ports:
      - "${EMBEDDER_GPU_PORT}:8080"
    deploy:
      resources:
        reservations:
          devices:
            - capabilities: [gpu]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped

  faiss-rag-cpu:
    build:
      context: .
      dockerfile: Dockerfile.retrieval
    profiles: [cpu]
    volumes:
      - ./configs:/app/configs
      - ${INDEX_PATH_DIR}:/app/indexes
    ports:
      - "${RETRIEVAL_PORT}:8090"
    depends_on:
      embedder-cpu:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8090/health"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped

  faiss-rag-gpu:
    build:
      context: .
      dockerfile: Dockerfile.retrieval
    profiles: [gpu]
    volumes:
      - ./configs:/app/configs
      - ${INDEX_PATH_DIR}:/app/indexes
    ports:
      - "${RETRIEVAL_PORT}:8090"
    depends_on:
      embedder-gpu:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8090/health"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped

