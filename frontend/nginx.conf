server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # SPA: serve index.html for any non-file route (react-router handles it).
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy the API routes the frontend calls (api.js uses relative paths) to
    # the generation service. ECHO_API_URL is the compose service hostname.
    location ~ ^/(auth|sessions|health) {
        proxy_pass http://echo-llm:8100;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        # Required for the /sessions/{id}/message/stream SSE endpoint:
        # don't buffer, keep the connection open.
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 1h;
    }
}
